; PlatformIO Project Configuration File
; ESP32-S3-ETH-8DI-8RO (Waveshare) - Ethernet W5500 + AsyncWebServer + OSC

[platformio]
default_envs = esp32s3_eth_8di_8ro

[env:esp32s3_eth_8di_8ro]
platform = espressif32@^6.8.1
board = esp32-s3-devkitc-1
framework = arduino

; -------- Upload / Monitor --------
upload_speed = 921600
monitor_speed = 115200
monitor_filters =
  esp32_exception_decoder
  time
  colorize

; Si PlatformIO n’auto-détecte pas bien le port :
; upload_port = /dev/cu.usbmodemXXXX
; monitor_port = /dev/cu.usbmodemXXXX

; -------- Build options --------
build_type = release

; Active l’USB CDC au boot (utile sur ESP32-S3)
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CORE_DEBUG_LEVEL=1

  ; --- Projet : options de logs (à adapter si ton code les lit) ---
  -D TRIODO_LOG_OSC=1
  -D TRIODO_LOG_OSC_RATELIMIT=1

  ; --- Réseau / OSC defaults (optionnels si ton code a déjà des defaults) ---
  -D TRIODO_DEFAULT_OSC_PORT=9000
  -D TRIODO_HTTP_PORT=80

; -------- Libraries (versions verrouillées) --------
lib_deps =
  ; Async Web (ESP32)
  me-no-dev/ESP Async WebServer@3.9.0
  me-no-dev/AsyncTCP@3.4.9

  ; JSON pour API + UI
  bblanchon/ArduinoJson@7.4.2

  ; OSC léger (UDP)
  mlabbe/MicroOsc@0.1.9

; -------- Recommended for stability --------
lib_ldf_mode = chain+
lib_compat_mode = strict
build_unflags =
  -Os

; -------- Optional: filesystem (si tu ajoutes plus tard SPIFFS/LittleFS) --------
; board_build.filesystem = littlefs

; -------- Optional: partitions (utile si tu ajoutes OTA / FS) --------
; board_build.partitions = default_8MB.csv
; Si ta carte a 16MB (à confirmer), tu peux ensuite passer à :
; board_build.flash_size = 16MB
; board_build.partitions = default_16MB.csv
